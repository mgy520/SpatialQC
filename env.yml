name: spatialqc
channels:
  - conda-forge

dependencies:
  - python=3.12

  # Core stack (conda-forge py3.12)
  - scanpy=1.10.*
  - squidpy=1.5.*
  - anndata=0.10.*
  - leidenalg
  - umap-learn
  - scipy
  - numpy
  - pandas
  # Scrublet uses Annoy; conda-forge build avoids Illegal instruction on some CPUs (vs pip wheel)
  - python-annoy

  # Spatial + imaging
  - scikit-image
  - tifffile
  - imageio
  - zarr
  - dask

  # plotting
  - matplotlib
  - seaborn

  # R support (for .rds via anndata2ri + rpy2; install R packages in R separately)
  - r-base=4.3
  - rpy2

  # IO
  - h5py
  - ipykernel
